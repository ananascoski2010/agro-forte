<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Agro Forte</title>
  <style>
    body { background: #4CAF50; color: white; text-align: center; padding-top: 100px; font-family: Arial; margin: 0; }
    h1 { font-size: 48px; margin-bottom: 10px; }
    p { font-size: 20px; margin-bottom: 30px; }
    button { padding: 15px 30px; font-size: 18px; background: white; color: #4CAF50; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    button:hover { background: #f0f0f0; }
    #tela2 { display: none; }
  </style>
</head>
<body>

  <div id="tela1">
    <h1>Agro Forte</h1>
    <p>Futuro Sustentável</p>
    <button onclick="comecar()">Começar</button>
  </div>

  <div id="tela2">
    <h1>Bem-vindo à Agro Forte!</h1>
    <p>Aqui você encontra soluções para o campo 🌾</p>
    <button onclick="voltar()">Voltar</button>
  </div>

  <script>
    function comecar() {
      document.getElementById('tela1').style.display = 'none';
      document.getElementById('tela2').style.display = 'block';
    }
    function voltar() {
      document.getElementById('tela2').style.display = 'none';
      document.getElementById('tela1').style.display = 'block';
    }
  </script>

</body>
</html>
